<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Klartion — Connecting...</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #fff; color: #111; }
    .wrap { text-align: center; }
    .spinner { width: 32px; height: 32px; border: 2px solid #e5e4e0; border-top-color: #111; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; color: #6b7280; margin: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <p>Completing bank connection...</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code  = params.get('code');
    const state = params.get('state');

    if (code && state) {
      const parts = state.split('|');
      const klartion_url = parts.length > 1 ? parts[1] : 'http://localhost:3001';
      const callbackUrl = klartion_url + '/callback?' + window.location.search.slice(1);
      window.location.href = callbackUrl;
      setTimeout(function() {
        document.querySelector('.spinner').style.display = 'none';
        document.querySelector('p').innerHTML = 'Click below to complete the connection:<br><br><a href="' + callbackUrl + '" style="background:#111;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600;display:inline-block;">Complete connection →</a><br><br><span style="font-size:12px;color:#9ca3af;">If your browser blocks this, paste this URL in a new tab:</span><br><code style="font-size:11px;color:#2d7a4f;word-break:break-all;">' + callbackUrl + '</code>';
      }, 2000);
    } else {
      document.querySelector('.spinner').style.display = 'none';
      document.querySelector('p').textContent = 'Something went wrong. Please go back to Klartion and try again.';
    }
  </script>
</body>
</html>
